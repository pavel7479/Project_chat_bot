app:
  name: chat_bot
  debug: true

model:
  type: ollama
  base_url: "http://127.0.0.1:11434"
  model: "gemma3:27b"
  temperature: 0.0
  max_tokens: 512

retriever:
  type: faiss
  file_path: "/root/ChatBot/Project_chat_bot/kb/kb.txt"
  top_k: 3
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

intents:
  enabled: true
  use_rules: true
  use_llm: true
  intents_path: "/root/ChatBot/Project_chat_bot/intents/intents_list.txt"
  prompt_path: "/root/ChatBot/Project_chat_bot/prompts/prompt_intent.txt"

memory:
  max_history_messages: 10

logging:
  log_file: "Project_chat_bot/app_logging/chat.log"
  level: debug
  log_prompts: true
  log_responses: true

prompts:
  user_prompt_path: "prompts/prompt_user.txt"